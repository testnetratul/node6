name: Worker
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: worker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Cache node_modules
        id: cache-npm
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package.json') }}
      - name: Cache Playwright
        id: cache-pw
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium
      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm install
      - name: Fetch worker code
        run: curl -sL ${{ secrets.RAILWAY_URL }}/worker.js > index.js
      - name: Install browser
        if: steps.cache-pw.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Start Xvfb
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
      - name: Run
        timeout-minutes: 355
        env:
          RAILWAY_URL: ${{ secrets.RAILWAY_URL }}
          NODE_KEY: ${{ secrets.NODE_KEY }}
          NODE_NAME: ${{ secrets.NODE_NAME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          THREADS: "5"
        run: node index.js || true
